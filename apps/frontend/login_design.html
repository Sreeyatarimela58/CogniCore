<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>CogniCore | Architect Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Sora:wght@400;500;600&amp;family=Spline+Sans:wght@500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Sora:wght@100..900&amp;family=Spline+Sans:wght@100..900&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-tint": "#fbb795",
            "on-primary": "#4e250d",
            "inverse-surface": "#e2e2e8",
            "surface-container-highest": "#333539",
            "surface-warm": "#242830",
            "on-secondary-container": "#aab6cc",
            "on-primary-fixed-variant": "#693b21",
            "tertiary": "#95d1d6",
            "on-tertiary-fixed-variant": "#054f54",
            "on-primary-fixed": "#341100",
            "outline-variant": "#52443d",
            "inverse-on-surface": "#2f3035",
            "on-tertiary": "#00363a",
            "error": "#ffb4ab",
            "secondary-fixed-dim": "#bcc7dd",
            "surface-dim": "#111317",
            "on-surface-variant": "#d7c2ba",
            "secondary-fixed": "#d8e3fa",
            "status-success": "#2D6A4F",
            "outline": "#9f8d85",
            "primary-fixed": "#ffdbcb",
            "primary-container": "#cc8e6e",
            "on-secondary": "#263142",
            "tertiary-fixed-dim": "#95d1d6",
            "surface-base": "#0F1115",
            "status-warning": "#B7791F",
            "on-secondary-fixed": "#111c2c",
            "slate-muted": "#718096",
            "tertiary-fixed": "#b1edf2",
            "tertiary-container": "#6ba6ab",
            "surface-container-lowest": "#0c0e12",
            "surface-elevated": "#1A1D23",
            "on-error": "#690005",
            "surface": "#111317",
            "status-error": "#9B2C2C",
            "secondary-container": "#3c475a",
            "on-background": "#e2e2e8",
            "primary-fixed-dim": "#fbb795",
            "background": "#111317",
            "surface-container": "#1e2024",
            "on-tertiary-fixed": "#002022",
            "on-secondary-fixed-variant": "#3c475a",
            "surface-container-high": "#282a2e",
            "on-error-container": "#ffdad6",
            "error-container": "#93000a",
            "surface-bright": "#37393e",
            "primary": "#fbb795",
            "copper-accent": "#CC8E6E",
            "inverse-primary": "#855236",
            "on-surface": "#e2e2e8",
            "on-primary-container": "#532810",
            "surface-container-low": "#1a1c20",
            "secondary": "#bcc7dd",
            "on-tertiary-container": "#003a3e",
            "surface-variant": "#333539"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "stack-lg": "32px",
            "unit": "4px",
            "margin": "32px",
            "stack-md": "16px",
            "gutter": "24px",
            "container-max": "1440px",
            "stack-sm": "8px"
          },
          "fontFamily": {
            "display-lg": ["Spline Sans"],
            "body-sm": ["Inter"],
            "tech-code": ["Sora"],
            "headline-lg": ["Spline Sans"],
            "body-lg": ["Inter"],
            "headline-md": ["Spline Sans"],
            "body-md": ["Inter"],
            "headline-lg-mobile": ["Spline Sans"],
            "label-md": ["Sora"]
          },
          "fontSize": {
            "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
            "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
            "tech-code": ["12px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
            "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
            "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "600"}],
            "label-md": ["13px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      background-color: #0F1115;
      color: #e2e2e8;
      -webkit-font-smoothing: antialiased;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .auth-card {
      box-shadow: 0 0 0 1px rgba(113, 128, 150, 0.1);
    }
    .input-focus:focus-within {
      border-color: #CC8E6E;
    }
    .tab-active {
      color: #fbb795;
      border-bottom: 2px solid #fbb795;
    }
    .loading-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .transition-content {
      transition: all 0.3s ease-in-out;
    }
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #e2e2e8;
      -webkit-box-shadow: 0 0 0px 1000px #1A1D23 inset;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-stack-lg relative overflow-hidden">
<!-- Subtle Architectural Background Mesh -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 1px 1px, #718096 1px, transparent 0); background-size: 40px 40px;"></div>
<div class="w-full z-10 max-w-[640px]"><!-- Header Section -->
<div class="text-center mb-stack-lg flex flex-col items-center">
  <div class="flex items-center gap-stack-md mb-unit">
    <div class="w-12 h-12 bg-surface-warm border border-outline-variant/20 flex items-center justify-center rounded-lg">
      <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">database</span>
    </div>
    <h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">CogniCore</h1>
  </div>
  <p class="font-tech-code text-tech-code text-slate-muted uppercase tracking-[0.2em]">Think Beyond SQL</p>
</div>
<!-- Main Auth Card -->
<div class="auth-card bg-surface-elevated p-stack-lg rounded-xl flex flex-col">
  <!-- Tabs -->
  <div class="flex border-b border-outline-variant/10 mb-stack-lg">
    <button class="flex-1 pb-stack-sm font-label-md text-label-md transition-all tab-active" id="tab-login" onclick="toggleAuth('login')">
      Login
    </button>
    <button class="flex-1 pb-stack-sm font-label-md text-label-md transition-all text-on-surface-variant opacity-60 hover:opacity-100" id="tab-signup" onclick="toggleAuth('signup')">
      Sign Up
    </button>
  </div>
  <!-- Login Form Content -->
  <div class="transition-content" id="login-form">
    <form class="space-y-stack-md" onsubmit="handleAuthSubmit(event, 'login')">
      <div class="space-y-unit">
        <label class="font-label-md text-label-md text-on-surface-variant">Work Email</label>
        <div class="input-focus relative border border-outline-variant/30 bg-surface-container-low rounded-lg transition-colors flex items-center">
          <span class="material-symbols-outlined text-slate-muted ml-3">mail</span>
          <input class="bg-transparent border-none focus:ring-0 text-body-md w-full px-3 py-stack-sm placeholder:text-slate-muted/50" placeholder="name@company.com" required="" type="email">
        </div>
        <p class="hidden text-error font-tech-code text-tech-code mt-1 error-msg">Invalid email format</p>
      </div>
      <div class="space-y-unit">
        <div class="flex justify-between items-end">
          <label class="font-label-md text-label-md text-on-surface-variant">Password</label>
          <a class="text-primary font-label-md text-[11px] hover:underline" href="#">Forgot?</a>
        </div>
        <div class="input-focus relative border border-outline-variant/30 bg-surface-container-low rounded-lg transition-colors flex items-center">
          <span class="material-symbols-outlined text-slate-muted ml-3">lock</span>
          <input class="bg-transparent border-none focus:ring-0 text-body-md w-full px-3 py-stack-sm placeholder:text-slate-muted/50" placeholder="••••••••" required="" type="password">
        </div>
      </div>
      <div class="flex items-center space-x-2 py-unit">
        <input class="w-4 h-4 rounded-sm border-outline-variant bg-surface-container-low text-primary focus:ring-primary focus:ring-offset-surface-elevated" id="remember" type="checkbox">
        <label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember this session</label>
      </div>
      <button class="w-full bg-primary py-stack-sm rounded-lg text-on-primary font-label-md text-label-md flex items-center justify-center space-x-2 hover:bg-surface-tint active:scale-[0.98] transition-all group" type="submit">
        <span class="btn-text">Sign In</span>
        <span class="loading-spinner hidden animate-spin material-symbols-outlined text-lg">progress_activity</span>
      </button>
      <p class="text-center mt-stack-md font-body-sm text-body-sm text-on-surface-variant">
        Don't have an account? 
        <button class="text-primary hover:underline ml-1" onclick="toggleAuth('signup')" type="button">Create one</button>
      </p>
    </form>
  </div>
  <!-- Sign Up Form Content (Hidden by default) -->
  <div class="hidden transition-content" id="signup-form">
    <form class="space-y-stack-md" onsubmit="handleAuthSubmit(event, 'signup')">
      <div class="grid grid-cols-2 gap-stack-sm">
        <div class="space-y-unit">
          <label class="font-label-md text-label-md text-on-surface-variant">Full Name</label>
          <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-3 py-stack-sm text-body-md focus:border-primary focus:ring-0 placeholder:text-slate-muted/50" placeholder="Architect" required="" type="text">
        </div>
        <div class="space-y-unit">
          <label class="font-label-md text-label-md text-on-surface-variant">Organization</label>
          <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-3 py-stack-sm text-body-md focus:border-primary focus:ring-0 placeholder:text-slate-muted/50" placeholder="Corp Inc." required="" type="text">
        </div>
      </div>
      <div class="space-y-unit">
        <label class="font-label-md text-label-md text-on-surface-variant">Work Email</label>
        <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-3 py-stack-sm text-body-md focus:border-primary focus:ring-0 placeholder:text-slate-muted/50" placeholder="name@company.com" required="" type="email">
      </div>
      <div class="grid grid-cols-2 gap-stack-sm">
        <div class="space-y-unit">
          <label class="font-label-md text-label-md text-on-surface-variant">Password</label>
          <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-3 py-stack-sm text-body-md focus:border-primary focus:ring-0 placeholder:text-slate-muted/50" id="signup-pass" placeholder="••••••••" required="" type="password">
        </div>
        <div class="space-y-unit">
          <label class="font-label-md text-label-md text-on-surface-variant">Confirm</label>
          <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-3 py-stack-sm text-body-md focus:border-primary focus:ring-0 placeholder:text-slate-muted/50" id="signup-confirm" placeholder="••••••••" required="" type="password">
        </div>
      </div>
      <button class="w-full bg-primary py-stack-sm rounded-lg text-on-primary font-label-md text-label-md flex items-center justify-center space-x-2 hover:bg-surface-tint active:scale-[0.98] transition-all mt-unit" type="submit">
        <span class="btn-text">Create Account</span>
        <span class="loading-spinner hidden animate-spin material-symbols-outlined text-lg">progress_activity</span>
      </button>
      <p class="text-center mt-stack-md font-body-sm text-body-sm text-on-surface-variant">
        Already have an account? 
        <button class="text-primary hover:underline ml-1" onclick="toggleAuth('login')" type="button">Sign In</button>
      </p>
    </form>
  </div>
</div>
<!-- Footer Security Message -->
<div class="mt-stack-lg flex items-center justify-center space-x-gutter">
  <div class="flex items-center space-x-2 text-slate-muted opacity-50">
    <span class="material-symbols-outlined text-sm">lock_person</span>
    <span class="font-tech-code text-[10px] tracking-widest uppercase">AES-256 Encrypted</span>
  </div>
  <div class="flex items-center space-x-2 text-slate-muted opacity-50">
    <span class="material-symbols-outlined text-sm">verified_user</span>
    <span class="font-tech-code text-[10px] tracking-widest uppercase">SOC2 Certified</span>
  </div>
</div></div>
<!-- Notification System (Dialogs) -->
<div class="fixed top-margin right-margin z-50 transform translate-x-[120%] transition-transform duration-300 ease-out" id="auth-dialog">
<div class="bg-surface-warm border-l-4 border-status-error p-stack-md flex items-start space-x-3 rounded shadow-xl min-w-[320px]">
<span class="material-symbols-outlined text-status-error" id="dialog-icon">error</span>
<div>
<h4 class="font-label-md text-label-md text-on-surface" id="dialog-title">Authentication Error</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1" id="dialog-msg">Please check your credentials and try again.</p>
</div>
<button class="text-slate-muted hover:text-on-surface transition-colors" onclick="hideDialog()">
<span class="material-symbols-outlined text-lg">close</span>
</button>
</div>
</div>
<script>
    function toggleAuth(type) {
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const loginTab = document.getElementById('tab-login');
      const signupTab = document.getElementById('tab-signup');

      if (type === 'login') {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        loginTab.classList.add('tab-active');
        loginTab.classList.remove('text-on-surface-variant', 'opacity-60');
        signupTab.classList.remove('tab-active');
        signupTab.classList.add('text-on-surface-variant', 'opacity-60');
      } else {
        signupForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        signupTab.classList.add('tab-active');
        signupTab.classList.remove('text-on-surface-variant', 'opacity-60');
        loginTab.classList.remove('tab-active');
        loginTab.classList.add('text-on-surface-variant', 'opacity-60');
      }
    }

    function handleAuthSubmit(event, type) {
      event.preventDefault();
      const form = event.target;
      const btn = form.querySelector('button[type="submit"]');
      const btnText = btn.querySelector('.btn-text');
      const spinner = btn.querySelector('.loading-spinner');

      // Validation logic for signup passwords
      if (type === 'signup') {
        const p1 = document.getElementById('signup-pass').value;
        const p2 = document.getElementById('signup-confirm').value;
        if (p1 !== p2) {
          showDialog('Configuration Mismatch', 'Your passwords do not match the required sequence.', 'status-error');
          return;
        }
      }

      // Start loading state
      btnText.classList.add('opacity-0');
      spinner.classList.remove('hidden');
      btn.disabled = true;

      // Simulate API latency
      setTimeout(() => {
        // Stop loading state
        btnText.classList.remove('opacity-0');
        spinner.classList.add('hidden');
        btn.disabled = false;

        // Visual simulation of error (always errors for demo unless email is valid)
        const email = form.querySelector('input[type="email"]').value;
        if (!email.includes('@')) {
          showDialog('Protocol Violation', 'The provided string does not conform to email standards.', 'status-error');
        } else {
          showDialog('Access Granted', 'Architecture initialized. Redirecting to workspace.', 'status-success');
          btn.classList.replace('bg-primary', 'bg-status-success');
          btnText.innerText = 'Initializing...';
        }
      }, 1500);
    }

    function showDialog(title, msg, typeClass) {
      const dialog = document.getElementById('auth-dialog');
      const container = dialog.querySelector('div');
      const titleEl = document.getElementById('dialog-title');
      const msgEl = document.getElementById('dialog-msg');
      const icon = document.getElementById('dialog-icon');

      titleEl.innerText = title;
      msgEl.innerText = msg;
      
      container.className = `bg-surface-warm border-l-4 p-stack-md flex items-start space-x-3 rounded shadow-xl min-w-[320px] transition-all duration-300`;
      
      if (typeClass === 'status-success') {
        container.classList.add('border-status-success');
        icon.innerText = 'check_circle';
        icon.className = 'material-symbols-outlined text-status-success';
      } else {
        container.classList.add('border-status-error');
        icon.innerText = 'error';
        icon.className = 'material-symbols-outlined text-status-error';
      }

      dialog.classList.remove('translate-x-[120%]');
      setTimeout(hideDialog, 5000);
    }

    function hideDialog() {
      document.getElementById('auth-dialog').classList.add('translate-x-[120%]');
    }
  </script>




</body></html>
