version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cognicore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cognicore
      POSTGRES_PASSWORD: cognicorepassword
      POSTGRES_DB: cognicore
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
