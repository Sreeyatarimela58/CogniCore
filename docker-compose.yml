version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cognicore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cognicore
      POSTGRES_PASSWORD: cognicorepassword
      POSTGRES_DB: cognicore
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: cognicore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
